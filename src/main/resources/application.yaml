spring:
  application:
    name: discount
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/micr-synch}
    username: ${DB_USERNAME:qwe}
    password: ${DB_PASSWORD:qwe}
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:29092}
    topic:
      discount-changes: ${KAFKA_TOPIC_DISCOUNT_CHANGES:discountChangesTopic}
      partitions: ${KAFKA_TOPIC_PARTITIONS:3}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      observation-enabled: true
    template:
      observation-enabled: true
server:
  port: ${SERVER_PORT:7005}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.serjnn: DEBUG
